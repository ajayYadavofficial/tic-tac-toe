services:
  ttt-postgres:
    image: postgres:15-alpine
    container_name: ttt-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  ttt-nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: ttt-nakama
    depends_on:
      ttt-postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@ttt-postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@ttt-postgres:5432/nakama
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
        --matchmaker.interval_sec 1
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./server/modules:/nakama/data/modules
    restart: unless-stopped

volumes:
  postgres_data:
