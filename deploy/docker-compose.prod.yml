# Production Docker Compose — Tic-Tac-Toe with Nakama
#
# Usage:
#   1. Build the Go plugin:     docker build -f deploy/Dockerfile.nakama -t ttt-nakama ./server
#   2. Build Flutter web:       (see deploy.sh or build manually)
#   3. Start:                   docker compose -f deploy/docker-compose.prod.yml up -d
#
# Environment variables (set in .env or export):
#   POSTGRES_PASSWORD  — database password (default: changeme)
#   DOMAIN             — public domain name (default: localhost)

services:
  ttt-postgres:
    image: postgres:15-alpine
    container_name: ttt-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ttt-nakama:
    image: ttt-nakama:latest
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.nakama
    container_name: ttt-nakama
    depends_on:
      ttt-postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:${POSTGRES_PASSWORD:-changeme}@ttt-postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:${POSTGRES_PASSWORD:-changeme}@ttt-postgres:5432/nakama
        --logger.level INFO
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
        --matchmaker.interval_sec 1
    expose:
      - "7350"
    restart: unless-stopped

  ttt-web:
    image: ttt-web:latest
    container_name: ttt-web
    depends_on:
      - ttt-nakama
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
